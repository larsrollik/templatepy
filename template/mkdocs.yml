site_name: [[ project_name ]]
site_description: [[ project_description ]]
site_url: https://[[ github_username ]].github.io/[[ github_repo ]]/
repo_url: https://github.com/[[ github_username ]]/[[ github_repo ]]
repo_name: [[ github_username ]]/[[ github_repo ]]
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: teal
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

# Uncomment to enable auto-generated API reference from docstrings.
# Requires: mkdocstrings[python] in the docs optional-dependencies group.
# plugins:
#   - search
#   - mkdocstrings:
#       handlers:
#         python:
#           options:
#             show_source: false
#             show_root_heading: true
#             heading_level: 3

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
