name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Install copier
        run: uv tool install copier

      - name: Validate copier.yaml — generate test project
        run: |
          copier copy . /tmp/test-output \
            --defaults \
            --overwrite \
            --trust \
            --data project_name="Test Project" \
            --data project_description="A test project" \
            --data author_name="Test Author" \
            --data author_email="test@example.com" \
            --data github_username="testuser" \
            --data github_repo="test-project"

      - name: List generated output
        run: find /tmp/test-output -type f | sort

      - name: Check generated structure
        run: |
          test -f /tmp/test-output/pyproject.toml
          test -f /tmp/test-output/CITATION.cff
          test -f /tmp/test-output/.pre-commit-config.yaml
          test -f /tmp/test-output/.github/workflows/ci.yml
          test -f /tmp/test-output/.github/workflows/bump.yml
          test -f /tmp/test-output/.github/workflows/release.yml
          echo "All expected files present."

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [validate, secrets-scan]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.validate.result }}" != "success" ]]; then
            echo "validate failed" && exit 1
          fi
          if [[ "${{ needs.secrets-scan.result }}" != "success" ]]; then
            echo "secrets-scan failed" && exit 1
          fi
          echo "All required checks passed."
