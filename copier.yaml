# templatepy — copier template configuration
# Usage: copier copy gh:larsrollik/templatepy my-new-project
# Update: copier update (inside an existing generated project)

_subdirectory: template
# Render every file's content. Template files carry no `.jinja` suffix; copier
# >=9.2 defaults `_templates_suffix` to ".jinja", which would copy files
# verbatim and leak literal [[ ]] tokens into generated projects.
_templates_suffix: ""
_min_copier_version: "9.0"
_answers_file: .copier-answers.yml

# Use [[ ]] delimiters in template files to avoid conflicts with
# GitHub Actions ${{ }} expression syntax.
_envops:
  block_start_string: "[%"
  block_end_string: "%]"
  variable_start_string: "[["
  variable_end_string: "]]"
  comment_start_string: "[#"
  comment_end_string: "#]"

# ---------------------------------------------------------------------------
# Questions
# ---------------------------------------------------------------------------

project_name:
  type: str
  help: "Human-readable project name (e.g. 'My Awesome Project')"

project_slug:
  type: str
  help: "Python package name — lowercase, underscores (e.g. 'my_awesome_project')"
  default: "[[ project_name | lower | replace(' ', '_') | replace('-', '_') ]]"

project_description:
  type: str
  help: "Short one-line description"

author_name:
  type: str
  help: "Your full name"
  default: "Lars B. Rollik"

author_email:
  type: str
  help: "Your email address"
  default: "lars@rollik.me"

github_username:
  type: str
  help: "GitHub username or organization"

github_repo:
  type: str
  help: "GitHub repository name"
  default: "[[ project_slug | replace('_', '-') ]]"

python_requires:
  type: str
  help: "Minimum Python version"
  default: "3.13"
  choices:
    - "3.10"
    - "3.11"
    - "3.12"
    - "3.13"
    - "3.14"

year:
  type: str
  help: "Copyright year"
  default: "[[ '%Y' | strftime ]]"

license_type:
  type: str
  help: "Licence for the generated project. noncommercial = custom MSW licence (research/academic only, no commercial use without agreement). bsd3 = BSD-3-Clause (hardware wrappers and utilities — allows commercial use)."
  choices:
    "Custom noncommercial (MSW default)": noncommercial
    "BSD-3-Clause (hardware wrappers / utilities)": bsd3
  default: noncommercial

private_repo_deps:
  type: bool
  help: "Does this project depend on private GitHub repos (git+ deps)? Adds a git-auth step to CI so it can clone them."
  default: false

private_repo_auth:
  type: str
  help: "How should CI authenticate to clone the private repos?"
  when: "[[ private_repo_deps ]]"
  default: app
  choices:
    # Org-owned GitHub App: per-run installation token, no user PAT. CI reads
    # secrets CI_APP_ID + CI_APP_PRIVATE_KEY (create the App with Contents:read
    # on the repos and set the secrets at org level). Recommended.
    "GitHub App (org-owned, per-run token)": app
    # Personal access token stored as the PRIVATE_REPO_ACCESS_TOKEN secret.
    "Personal access token (PRIVATE_REPO_ACCESS_TOKEN)": pat

test_on_windows:
  type: bool
  help: "Add windows-latest to the CI test matrix? Enable for path-sensitive or Windows-targeted packages."
  default: false
